<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🎮 미니게임 나라</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
  }
  body {
    height: 100dvh;
    background: linear-gradient(160deg, #ffe29f 0%, #ffa99f 48%, #a1c4fd 100%);
  }

  .screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
  }
  .screen.on { display: flex; }

  /* ---------- 공통 UI ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 64px;
  }
  .topbar .title {
    flex: 1;
    text-align: center;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 800;
    color: #4a3423;
    text-shadow: 0 2px 0 rgba(255,255,255,.55);
  }
  .iconbtn {
    width: 64px;
    height: 64px;
    border: none;
    border-radius: 20px;
    background: rgba(255,255,255,.9);
    box-shadow: 0 4px 0 rgba(0,0,0,.12);
    font-size: 30px;
    cursor: pointer;
  }
  .iconbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }

  .bigbtn {
    border: none;
    border-radius: 22px;
    padding: 16px 28px;
    min-height: 64px;
    font-size: clamp(20px, 4.5vw, 26px);
    font-weight: 800;
    color: #fff;
    background: #ff8a3d;
    box-shadow: 0 6px 0 #d96a20;
    cursor: pointer;
  }
  .bigbtn.blue { background: #4f9cf7; box-shadow: 0 6px 0 #2f77d0; }
  .bigbtn.green { background: #43b649; box-shadow: 0 6px 0 #2f8f35; }
  .bigbtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d96a20; }
  .bigbtn.blue:active { box-shadow: 0 2px 0 #2f77d0; }
  .bigbtn.green:active { box-shadow: 0 2px 0 #2f8f35; }

  /* 레벨 선택 */
  .lvrow {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .lvbtn {
    width: clamp(80px, 21vw, 108px);
    height: clamp(80px, 21vw, 108px);
    border: none;
    border-radius: 24px;
    font-size: clamp(30px, 8vw, 42px);
    font-weight: 800;
    color: #fff;
    background: #ff8a3d;
    box-shadow: 0 6px 0 #d96a20;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
  }
  .lvbtn .stars { font-size: clamp(13px, 3.5vw, 17px); min-height: 1.2em; }
  .lvbtn:disabled { background: #c9c9c9; box-shadow: 0 6px 0 #a5a5a5; }
  .lvbtn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 #d96a20; }

  .hud {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 6px 0 10px;
    flex-wrap: wrap;
  }
  .pill {
    background: rgba(255,255,255,.9);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: clamp(17px, 4vw, 22px);
    font-weight: 800;
    color: #4a3423;
    box-shadow: 0 3px 0 rgba(0,0,0,.1);
  }

  /* 결과 오버레이 */
  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(60, 40, 20, .45);
    z-index: 50;
  }
  .overlay.on { display: flex; }
  .overlay .card {
    background: #fffdf5;
    border-radius: 28px;
    padding: 30px 26px;
    width: min(88vw, 420px);
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,.25);
    animation: bounceIn .45s;
  }
  .overlay .card .big { font-size: 64px; }
  .overlay .card h2 { font-size: clamp(24px, 6vw, 32px); color: #4a3423; margin: 8px 0 6px; }
  .overlay .card p { font-size: clamp(18px, 4.5vw, 22px); color: #7a6753; margin-bottom: 18px; }
  .overlay .card .row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  @keyframes bounceIn {
    0% { transform: scale(.5); opacity: 0; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* 성공 대축하 모드 */
  .overlay .card.win {
    background: linear-gradient(160deg, #fffdf5, #fff1bd);
    box-shadow: 0 0 0 6px #ffd75e, 0 14px 44px rgba(255, 170, 0, .5);
  }
  .overlay .card.win h2 {
    background: linear-gradient(90deg, #ff5f6d, #ff9a3d, #2fbf71, #4f9cf7, #9b6ef3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: praisePulse .7s ease-in-out infinite alternate;
  }
  @keyframes praisePulse {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }
  .overlay .card.win .big { animation: tada 1s ease infinite; }
  @keyframes tada {
    0%, 100% { transform: scale(1) rotate(0); }
    20% { transform: scale(1.25) rotate(-8deg); }
    40% { transform: scale(1.25) rotate(8deg); }
    60% { transform: scale(1.18) rotate(-5deg); }
    80% { transform: scale(1.1) rotate(5deg); }
  }

  /* 콘페티 */
  .confetti {
    position: fixed;
    top: -50px;
    font-size: 30px;
    z-index: 60;
    pointer-events: none;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* ---------- 메뉴 ---------- */
  #menu .logo {
    text-align: center;
    padding: 8px 0 4px;
  }
  #menu .logo h1 {
    font-size: clamp(30px, 8vw, 46px);
    color: #4a3423;
    text-shadow: 0 3px 0 rgba(255,255,255,.6);
  }
  #menu .logo p { font-size: clamp(16px, 4vw, 20px); color: #6d5844; margin-top: 4px; }
  #menu .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 3vh, 28px);
    overflow-y: auto;
  }
  #menu .logo { margin-top: auto; }
  #menu #trophyBtn { margin-bottom: auto; flex-shrink: 0; }
  #menu .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    align-content: center;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    padding: 10px 4px;
  }
  .gamecard {
    border: none;
    border-radius: 26px;
    padding: 18px 10px;
    background: rgba(255,255,255,.92);
    box-shadow: 0 6px 0 rgba(0,0,0,.13);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-height: 116px;
  }
  .gamecard:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.13); }
  .gamecard .emoji { font-size: clamp(44px, 11vw, 60px); }
  .gamecard .name { font-size: clamp(18px, 4.5vw, 23px); font-weight: 800; color: #4a3423; }
  .gamecard .best { font-size: clamp(13px, 3.2vw, 16px); font-weight: 700; color: #b8860b; min-height: 1.2em; }
  #trophyBtn {
    display: block;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    background: linear-gradient(135deg, #ffd75e, #f7a934);
    box-shadow: 0 6px 0 #cf8420;
    color: #7a4c00;
  }
  #trophyBtn:active { box-shadow: 0 2px 0 #cf8420; }

  /* ---------- 비행기 슈팅 ---------- */
  #plane .stage {
    flex: 1;
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    background: linear-gradient(#16255c, #35509e 65%, #5f7fc9);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.35);
    touch-action: none;
    cursor: pointer;
  }
  #plane canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #plane .hint {
    position: absolute;
    left: 0; right: 0; top: 10%;
    text-align: center;
    font-size: clamp(17px, 4.4vw, 22px);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,.45);
    pointer-events: none;
  }

  /* ---------- 버블 팡팡 ---------- */
  #bubble .pond {
    flex: 1;
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    background: linear-gradient(#c9f0ff, #8ddcf8 55%, #5fc0ea);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.5);
  }
  .bub {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.85);
    box-shadow: inset -6px -8px 14px rgba(0,0,0,.08), inset 6px 8px 14px rgba(255,255,255,.5);
    cursor: pointer;
    will-change: transform;
  }
  .bub.pop {
    transition: transform .16s, opacity .16s;
    transform: scale(1.7) !important;
    opacity: 0;
  }

  /* ---------- 사진 퍼즐 ---------- */
  #puzzle .hud { align-items: center; }
  #puzRef {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    object-fit: cover;
    background: #fff;
    box-shadow: 0 3px 0 rgba(0,0,0,.15);
  }
  .puzwrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 8px;
    min-height: 0;
  }
  .puzboard {
    display: grid;
    gap: 4px;
    background: rgba(255,255,255,.75);
    padding: 6px;
    border-radius: 18px;
    box-shadow: 0 6px 0 rgba(0,0,0,.12);
  }
  .ptile {
    background-repeat: no-repeat;
    border-radius: 8px;
    cursor: pointer;
  }
  .ptile.sel {
    outline: 4px solid #ff8a3d;
    transform: scale(1.06);
    z-index: 1;
  }

  /* ---------- 트로피 방 ---------- */
  #trophy .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }
  #trophy .champ { text-align: center; }
  .champbox {
    max-width: 560px;
    margin: 0 auto;
    background: linear-gradient(135deg, #ffe066, #ffb703);
    border-radius: 22px;
    padding: 14px 16px;
    font-size: clamp(19px, 5vw, 26px);
    font-weight: 800;
    color: #7a4c00;
    box-shadow: 0 5px 0 rgba(0,0,0,.15);
    animation: bounceIn .5s;
  }
  .champbox small { display: block; font-size: clamp(14px, 3.6vw, 18px); margin-top: 4px; }
  #trophy .trolist {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    padding-bottom: 8px;
  }
  .trocard {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,.92);
    border-radius: 22px;
    padding: 14px 18px;
    box-shadow: 0 5px 0 rgba(0,0,0,.12);
    cursor: pointer;
  }
  .trocard:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.12); }
  .trocard .g { font-size: clamp(34px, 9vw, 46px); }
  .trocard .info { flex: 1; }
  .trocard .nm { font-weight: 800; font-size: clamp(17px, 4.2vw, 21px); color: #4a3423; }
  .trocard .lv { font-size: clamp(15px, 3.8vw, 19px); margin-top: 2px; letter-spacing: 2px; color: #7a6753; }
  .trocard .cup { font-size: clamp(34px, 9vw, 46px); filter: grayscale(1) opacity(.3); }
  .trocard.done .cup { filter: none; animation: matched .6s; }

  /* ---------- 카드 짝맞추기 ---------- */
  #memory .board {
    flex: 1;
    display: grid;
    gap: 10px;
    align-content: center;
    justify-content: center;
    width: 100%;
    margin: 0 auto;
    padding-bottom: 8px;
  }
  .mcard {
    aspect-ratio: 3/3.4;
    perspective: 600px;
    cursor: pointer;
  }
  .mcard .inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .35s;
  }
  .mcard.open .inner { transform: rotateY(180deg); }
  .mcard .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(34px, 9vw, 54px);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 4px 0 rgba(0,0,0,.12);
  }
  .mcard .back {
    background: linear-gradient(145deg, #6ec6ff, #4f9cf7);
    color: #fff;
  }
  .mcard .front {
    background: #fffdf5;
    transform: rotateY(180deg);
  }
  .mcard.matched { animation: matched .5s; }
  .mcard.matched .front { background: #d9f7d9; }
  @keyframes matched {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* ---------- 두더지 잡기 ---------- */
  #mole .field {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-content: center;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding-bottom: 8px;
  }
  .hole {
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 62%, #6b4a2c 0 58%, #8a6238 60% 100%);
    box-shadow: inset 0 8px 14px rgba(0,0,0,.4);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
  }
  .hole .mole {
    font-size: clamp(44px, 12vw, 66px);
    line-height: 1;
    transform: translateY(115%);
    transition: transform .14s ease-out;
    padding-bottom: 8%;
  }
  .hole.up .mole { transform: translateY(0); }
  .hole.bonk .mole { transition: none; }

  /* ---------- 점프 러너 ---------- */
  #runner .stage {
    flex: 1;
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    background: linear-gradient(#bfe9ff 0 72%, #8bd06b 72% 100%);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.5);
    cursor: pointer;
  }
  #runner canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #runner .hint {
    position: absolute;
    left: 0; right: 0; top: 12%;
    text-align: center;
    font-size: clamp(18px, 4.6vw, 24px);
    font-weight: 800;
    color: #33691e;
    text-shadow: 0 2px 0 rgba(255,255,255,.7);
    pointer-events: none;
  }

  /* ---------- 숫자 세기 퀴즈 ---------- */
  #quiz .task {
    text-align: center;
    font-size: clamp(18px, 4.6vw, 24px);
    font-weight: 800;
    color: #4a3423;
    padding-bottom: 8px;
    text-shadow: 0 2px 0 rgba(255,255,255,.5);
  }
  #quiz .fruitbox {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    gap: clamp(6px, 2vw, 14px);
    background: rgba(255,255,255,.65);
    border-radius: 24px;
    margin: 0 auto 14px;
    max-width: 560px;
    width: 100%;
    padding: 16px;
    font-size: clamp(40px, 11vw, 64px);
  }
  #quiz .fruitbox span { animation: popIn .3s backwards; }
  @keyframes popIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  #quiz .answers {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding-bottom: 10px;
  }
  .numbtn {
    width: clamp(84px, 24vw, 120px);
    height: clamp(84px, 24vw, 120px);
    border: none;
    border-radius: 26px;
    font-size: clamp(38px, 10vw, 54px);
    font-weight: 800;
    color: #fff;
    background: #9b6ef3;
    box-shadow: 0 7px 0 #7247c9;
    cursor: pointer;
  }
  .numbtn:active { transform: translateY(4px); box-shadow: 0 3px 0 #7247c9; }
  .numbtn.wrong { animation: shake .4s; background: #c9c9c9; box-shadow: 0 7px 0 #a5a5a5; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
</style>
</head>
<body>

<!-- ================= 메뉴 ================= -->
<div id="menu" class="screen on">
  <div class="topbar">
    <div style="width:64px"></div>
    <div class="title"></div>
    <button class="iconbtn" id="soundBtn">🔊</button>
  </div>
  <div class="center">
  <div class="logo">
    <h1>🎮 미니게임 나라</h1>
    <p>하고 싶은 게임을 골라 봐!</p>
  </div>
  <div class="grid">
    <button class="gamecard" data-game="memory">
      <span class="emoji">🐘</span>
      <span class="name">카드 짝맞추기</span>
      <span class="best" id="bestMemory"></span>
    </button>
    <button class="gamecard" data-game="mole">
      <span class="emoji">🐹</span>
      <span class="name">두더지 잡기</span>
      <span class="best" id="bestMole"></span>
    </button>
    <button class="gamecard" data-game="runner">
      <span class="emoji">🦖</span>
      <span class="name">점프 공룡</span>
      <span class="best" id="bestRunner"></span>
    </button>
    <button class="gamecard" data-game="quiz">
      <span class="emoji">🍎</span>
      <span class="name">숫자 세기</span>
      <span class="best" id="bestQuiz"></span>
    </button>
    <button class="gamecard" data-game="plane">
      <span class="emoji">🚀</span>
      <span class="name">비행기 슈팅</span>
      <span class="best" id="bestPlane"></span>
    </button>
    <button class="gamecard" data-game="bubble">
      <span class="emoji">🫧</span>
      <span class="name">버블 팡팡</span>
      <span class="best" id="bestBubble"></span>
    </button>
    <button class="gamecard" data-game="puzzle" style="grid-column: span 2">
      <span class="emoji">🧩</span>
      <span class="name">사진 퍼즐</span>
      <span class="best" id="bestPuzzle"></span>
    </button>
  </div>
  <button class="bigbtn" id="trophyBtn">🏆 트로피 방</button>
  </div>
</div>

<!-- ================= 비행기 슈팅 ================= -->
<div id="plane" class="screen">
  <div class="topbar">
    <button class="iconbtn home">🏠</button>
    <div class="title">🚀 비행기 슈팅</div>
    <div style="width:64px"></div>
  </div>
  <div class="hud">
    <div class="pill" id="planeLevel">레벨 1</div>
    <div class="pill" id="planeScore">⭐ 0</div>
    <div class="pill" id="planeTarget">🎯 15</div>
  </div>
  <div class="stage sky" id="planeStage">
    <canvas id="planeCanvas"></canvas>
    <div class="hint" id="planeHint">손가락을 움직여서 조종해요!<br>총알은 자동으로 나가요 ✨</div>
  </div>
</div>

<!-- ================= 버블 팡팡 ================= -->
<div id="bubble" class="screen">
  <div class="topbar">
    <button class="iconbtn home">🏠</button>
    <div class="title">🫧 버블 팡팡</div>
    <div style="width:64px"></div>
  </div>
  <div class="hud">
    <div class="pill" id="bubLevel">레벨 1</div>
    <div class="pill" id="bubTime">⏰ 30</div>
    <div class="pill" id="bubScore">⭐ 0</div>
    <div class="pill" id="bubTarget">🎯 15</div>
  </div>
  <div class="pond" id="bubPond"></div>
</div>

<!-- ================= 사진 퍼즐 ================= -->
<div id="puzzle" class="screen">
  <div class="topbar">
    <button class="iconbtn home">🏠</button>
    <div class="title">🧩 사진 퍼즐</div>
    <button class="iconbtn" id="puzPick">📷</button>
  </div>
  <div class="hud">
    <div class="pill" id="puzLevel">레벨 1</div>
    <div class="pill" id="puzMoves">바꾼 횟수 0</div>
    <img id="puzRef" alt="완성 그림" />
  </div>
  <div class="puzwrap"><div class="puzboard" id="puzBoard"></div></div>
  <input type="file" id="puzFile" accept="image/*" style="display:none" />
</div>

<!-- ================= 트로피 방 ================= -->
<div id="trophy" class="screen">
  <div class="topbar">
    <button class="iconbtn home">🏠</button>
    <div class="title">🏆 트로피 방</div>
    <div style="width:64px"></div>
  </div>
  <div class="body">
    <div class="champ" id="troChamp"></div>

<script>
'use strict';
/* ============================================================
   공통 유틸
============================================================ */
const $ = (sel) => document.querySelector(sel);
const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const store = {
  get: (k) => { try { return localStorage.getItem('kidgames:' + k); } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem('kidgames:' + k, v); } catch {} },
};

/* ---------- 효과음 (WebAudio 합성음) ---------- */
let audioCtx = null;
let muted = store.get('muted') === '1';
function beep(freq, dur, type = 'sine', vol = 0.25, when = 0) {
  if (muted) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime + when;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  } catch {}
}
const sfx = {
  tap: () => beep(600, 0.08, 'square', 0.12),
  good: () => { beep(660, 0.12); beep(880, 0.18, 'sine', 0.25, 0.1); },
  bad: () => beep(180, 0.3, 'sawtooth', 0.15),
  bonk: () => { beep(300, 0.08, 'square', 0.2); beep(500, 0.1, 'square', 0.15, 0.05); },
  win: () => [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.22, 'sine', 0.25, i * 0.14)),
};
const soundBtn = $('#soundBtn');
soundBtn.textContent = muted ? '🔇' : '🔊';
soundBtn.addEventListener('pointerdown', () => {
  muted = !muted;
  store.set('muted', muted ? '1' : '0');
  soundBtn.textContent = muted ? '🔇' : '🔊';
  sfx.tap();
});

/* ---------- 콘페티 ---------- */
function confetti(n = 30) {
  const emojis = ['🎉', '⭐', '💛', '🌈', '✨', '🎈'];
  for (let i = 0; i < n; i++) {
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = 20 + Math.random() * 22 + 'px';
    s.style.animationDuration = 1.6 + Math.random() * 1.6 + 's';
    s.style.animationDelay = Math.random() * 0.4 + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 4000);
  }
}

/* ---------- 칭찬 대폭발 ---------- */
const PRAISES = [
  '우와~ 대박!! 🎉', '천재 아니야?! 🤩', '최고야 최고! 👍', '완전 멋져! ✨',
  '박수 짝짝짝! 👏', '우리 챔피언! 🏆', '진짜 잘한다! 💯', '와, 놀라운데?! 🚀',
  '짱이야 짱! 🌟', '반짝반짝 빛나!! 💎',
];
const praise = () => PRAISES[Math.floor(Math.random() * PRAISES.length)];
function speak(text) {
  if (muted) return;
  try {
    const clean = text.replace(/[^\p{L}\p{N}\s!?~,.]/gu, '').trim();
    if (!clean || !window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'ko-KR';
    u.pitch = 1.3;
    u.rate = 0.95;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch {}
}
function applause() {
  if (muted) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    for (let i = 0; i < 12; i++) {
      const t = audioCtx.currentTime + i * 0.085 + Math.random() * 0.03;
      const dur = 0.06;
      const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / d.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900 + Math.random() * 700;
      const g = audioCtx.createGain();
      g.gain.value = 0.22;
      src.connect(bp).connect(g).connect(audioCtx.destination);
      src.start(t);
    }
  } catch {}
}
function celebrate(msg) {
  sfx.win();
  applause();
  confetti(70);
  setTimeout(() => confetti(50), 550);
  speak(msg);
}

/* ---------- 레벨 잠금/클리어 ---------- */
const MAX_LEVEL = 3;
const unlockedLv = (g) => Math.min(MAX_LEVEL, Number(store.get('unlock:' + g) || 1));
const clearedLv = (g) => Number(store.get('clear:' + g) || 0);
function clearLevel(g, lv) {
  if (lv > clearedLv(g)) store.set('clear:' + g, String(lv));
  if (lv >= unlockedLv(g) && lv < MAX_LEVEL) store.set('unlock:' + g, String(lv + 1));
}

/* ---------- 화면 전환 ---------- */
let current = 'menu';
const games = { memory: null, mole: null, runner: null, quiz: null, plane: null, bubble: null, puzzle: null }; // start functions (level 인자)
const stoppers = { memory: null, mole: null, runner: null, quiz: null, plane: null, bubble: null, puzzle: null }; // cleanup functions
function show(id) {
  if (stoppers[current]) { stoppers[current](); }
  document.querySelectorAll('.screen').forEach((s) => s.classList.remove('on'));
  $('#' + id).classList.add('on');
  hideOverlay();
  current = id;
  if (id === 'menu') refreshBests();
  else if (id === 'trophy') renderTrophy();
  else showLevelSelect(id);
}

/* ---------- 트로피 방 ---------- */
const TRO_GAMES = [
  { key: 'memory', emoji: '🐘', name: '카드 짝맞추기', best: null },
  { key: 'mole', emoji: '🐹', name: '두더지 잡기', best: 'best:mole' },
  { key: 'runner', emoji: '🦖', name: '점프 공룡', best: 'best:runner' },
  { key: 'quiz', emoji: '🍎', name: '숫자 세기', best: 'best:quiz' },
  { key: 'plane', emoji: '🚀', name: '비행기 슈팅', best: 'best:plane' },
  { key: 'bubble', emoji: '🫧', name: '버블 팡팡', best: 'best:bubble' },
  { key: 'puzzle', emoji: '🧩', name: '사진 퍼즐', best: null },
];
function renderTrophy() {
  const list = $('#troList');
  list.innerHTML = '';
  let cups = 0;
  TRO_GAMES.forEach((g) => {
    const cl = clearedLv(g.key);
    const done = cl >= MAX_LEVEL;
    if (done) cups++;
    const stars = Array.from({ length: MAX_LEVEL }, (_, i) => (i < cl ? '⭐' : '▫️')).join('');
    const best = g.best && store.get(g.best);
    const card = document.createElement('div');
    card.className = 'trocard' + (done ? ' done' : '');
    card.innerHTML =
      `<span class="g">${g.emoji}</span>` +
      `<div class="info"><div class="nm">${g.name}</div>` +
      `<div class="lv">${stars}${best ? ` · 👑 ${best}점` : ''}</div></div>` +
      `<span class="cup">🏆</span>`;
    card.addEventListener('pointerdown', () => {
      if (done) { sfx.good(); confetti(12); } else { sfx.tap(); }
    });
    list.appendChild(card);
  });
  const champ = $('#troChamp');
  if (cups === TRO_GAMES.length) {
    champ.innerHTML = '<div class="champbox">👑 미니게임 챔피언! 👑<small>트로피를 전부 다 모았어!</small></div>';
    celebrate('우와, 미니게임 챔피언이야! 정말 정말 대단해!');
  } else {
    champ.innerHTML = `<div class="pill" style="display:inline-block">🏆 ${cups} / ${TRO_GAMES.length} 모았어! 레벨 3까지 깨면 트로피를 받아요</div>`;
  }
}
$('#trophyBtn').addEventListener('pointerdown', () => { sfx.tap(); show('trophy'); });

/* ---------- 레벨 선택 ---------- */
const GAME_EMOJI = { memory: '🐘', mole: '🐹', runner: '🦖', quiz: '🍎', plane: '🚀', bubble: '🫧', puzzle: '🧩' };
const lvOverlay = $('#lvOverlay');
function showLevelSelect(g) {
  $('#lvEmoji').textContent = GAME_EMOJI[g];
  const wrap = $('#lvBtns');
  wrap.innerHTML = '';
  const ul = unlockedLv(g);
  const cl = clearedLv(g);
  for (let lv = 1; lv <= MAX_LEVEL; lv++) {
    const b = document.createElement('button');
    b.className = 'lvbtn';
    if (lv > ul) {
      b.disabled = true;
      b.innerHTML = '<span>🔒</span><span class="stars"></span>';
    } else {
      b.innerHTML = `<span>${lv}</span><span class="stars">${lv <= cl ? '⭐' : ''}</span>`;
      b.addEventListener('pointerdown', () => {
        sfx.tap();
        lvOverlay.classList.remove('on');
        games[g](lv);
      });
    }
    wrap.appendChild(b);
  }
  lvOverlay.classList.add('on');
}
$('#lvHome').addEventListener('pointerdown', () => { sfx.tap(); show('menu'); });
document.querySelectorAll('.gamecard').forEach((btn) => {
  btn.addEventListener('pointerdown', () => { sfx.tap(); show(btn.dataset.game); });
});
document.querySelectorAll('.home').forEach((btn) => {
  btn.addEventListener('pointerdown', () => { sfx.tap(); show('menu'); });
});

function refreshBests() {
  const set = (id, game, key, label) => {
    const parts = [];
    const v = key && store.get(key);
    if (v) parts.push(`👑 ${v}${label}`);
    const stars = '⭐'.repeat(clearedLv(game));
    if (stars) parts.push(stars);
    $(id).textContent = parts.join(' ');
  };
  set('#bestMemory', 'memory', null, '');
  set('#bestMole', 'mole', 'best:mole', '점');
  set('#bestRunner', 'runner', 'best:runner', '점');
  set('#bestQuiz', 'quiz', 'best:quiz', '점');
  set('#bestPlane', 'plane', 'best:plane', '점');
  set('#bestBubble', 'bubble', 'best:bubble', '점');
  set('#bestPuzzle', 'puzzle', null, '');
}
refreshBests();

/* ---------- 결과 오버레이 ---------- */
const overlay = $('#overlay');
let retryFn = null;
let nextFn = null;
function showOverlay({ emoji, title, text, onRetry, onNext, win }) {
  $('#ovEmoji').textContent = emoji;
  $('#ovTitle').textContent = title;
  $('#ovText').textContent = text;
  retryFn = onRetry;
  nextFn = onNext || null;
  $('#ovNext').style.display = nextFn ? '' : 'none';
  overlay.querySelector('.card').classList.toggle('win', !!win);
  overlay.classList.add('on');
}
function hideOverlay() {
  overlay.classList.remove('on');
  lvOverlay.classList.remove('on');
}
$('#ovRetry').addEventListener('pointerdown', () => { sfx.tap(); overlay.classList.remove('on'); if (retryFn) retryFn(); });
$('#ovNext').addEventListener('pointerdown', () => { sfx.tap(); overlay.classList.remove('on'); if (nextFn) nextFn(); });
$('#ovHome').addEventListener('pointerdown', () => { sfx.tap(); show('menu'); });

/* 최고점수 갱신 - 갱신되었으면 true */
function saveBest(key, score) {
  const prev = Number(store.get('best:' + key) || 0);
  if (score > prev) { store.set('best:' + key, String(score)); return true; }
  return false;
}

/* ============================================================
   1. 카드 짝맞추기
============================================================ */
games.memory = function startMemory(level = 1) {
  const board = $('#memBoard');
  board.innerHTML = '';
  const pairsN = [4, 6, 8][level - 1];
  const cols = [2, 3, 4][level - 1]; // 항상 4줄
  const pool = ['🐘', '🦁', '🐼', '🐸', '🐙', '🦊', '🐢', '🐝', '🦄', '🐳'];
  const picks = shuffle(pool).slice(0, pairsN);
  const deck = shuffle([...picks, ...picks]);
  let first = null;
  let lock = false;
  let moves = 0;
  let matched = 0;
  $('#memLevel').textContent = '레벨 ' + level;
  $('#memMoves').textContent = '넘긴 횟수 0';

  // 세로 4줄이 화면을 넘지 않게 카드 크기를 계산
  function fitBoard() {
    const gap = 10;
    const w = board.clientWidth;
    const h = board.clientHeight;
    const cardW = Math.min(
      140,
      (w - gap * (cols - 1)) / cols,
      ((h - gap * 3) / 4) / (3.4 / 3)
    );
    board.style.gridTemplateColumns = `repeat(${cols}, ${Math.floor(cardW)}px)`;
  }

  deck.forEach((emoji) => {
    const card = document.createElement('div');
    card.className = 'mcard';
    card.innerHTML = `<div class="inner"><div class="face back">❓</div><div class="face front">${emoji}</div></div>`;
    card.addEventListener('pointerdown', () => {
      if (lock || card.classList.contains('open')) return;
      sfx.tap();
      card.classList.add('open');
      if (!first) { first = card; return; }
      moves++;
      $('#memMoves').textContent = '넘긴 횟수 ' + moves;
      const a = first;
      first = null;
      if (a.querySelector('.front').textContent === emoji) {
        a.classList.add('matched');
        card.classList.add('matched');
        matched++;
        sfx.good();
        confetti(6);
        if (matched === pairsN) {
          clearLevel('memory', level);
          setTimeout(() => {
            const p = praise();
            celebrate(p);
            showOverlay({
              emoji: '🎉',
              title: p,
              text: `레벨 ${level} 성공! ${moves}번 만에 다 맞췄어요!`,
              win: true,
              onRetry: () => startMemory(level),
              onNext: level < MAX_LEVEL ? () => startMemory(level + 1) : null,
            });
          }, 500);
        }
      } else {
        lock = true;
        sfx.bad();
        setTimeout(() => {
          a.classList.remove('open');
          card.classList.remove('open');
          lock = false;
        }, 750);
      }
    });
    board.appendChild(card);
  });
  fitBoard();
  memFit = fitBoard;
};
let memFit = null;
window.addEventListener('resize', () => {
  if (current === 'memory' && memFit) memFit();
});

/* ============================================================
   2. 두더지 잡기
============================================================ */
(function setupMole() {
  const field = $('#moleField');
  const holes = [];
  for (let i = 0; i < 9; i++) {
    const h = document.createElement('div');
    h.className = 'hole';
    h.innerHTML = '<span class="mole">🐹</span>';
    field.appendChild(h);
    holes.push(h);
  }
  // 레벨별: 두더지가 떠 있는 시간 / 등장 간격 / 목표 마릿수
  const CONF = [
    { up: 1600, gap: 800, target: 10 },
    { up: 1250, gap: 620, target: 15 },
    { up: 950, gap: 470, target: 20 },
  ];
  let conf = CONF[0];
  let moleLv = 1;
  let score = 0;
  let timeLeft = 30;
  let timerId = null;
  let popId = null;

  function clearTimers() {
    clearInterval(timerId);
    clearTimeout(popId);
    timerId = popId = null;
    holes.forEach((h) => h.classList.remove('up', 'bonk'));
  }
  stoppers.mole = clearTimers;

  holes.forEach((h) => {
    h.addEventListener('pointerdown', () => {
      if (!h.classList.contains('up')) return;
      h.classList.remove('up');
      h.classList.add('bonk');
      const face = h.querySelector('.mole');
      face.textContent = '💫';
      setTimeout(() => { face.textContent = '🐹'; h.classList.remove('bonk'); }, 250);
      score++;
      $('#moleScore').textContent = '⭐ ' + score;
      sfx.bonk();
    });
  });

  function popLoop() {
    const upTime = Math.max(600, conf.up - score * 12);   // 점수 오르면 조금씩 빨라짐
    const gap = Math.max(300, conf.gap - score * 5);
    const hidden = holes.filter((h) => !h.classList.contains('up'));
    const hole = hidden[Math.floor(Math.random() * hidden.length)];
    if (hole) {
      hole.classList.add('up');
      setTimeout(() => hole.classList.remove('up'), upTime);
    }
    popId = setTimeout(popLoop, gap + Math.random() * 300);
  }

  games.mole = function startMole(level = 1) {
    clearTimers();
    moleLv = level;
    conf = CONF[level - 1];
    score = 0;
    timeLeft = 30;
    $('#moleLevel').textContent = '레벨 ' + level;
    $('#moleScore').textContent = '⭐ 0';
    $('#moleTime').textContent = '⏰ 30';
    $('#moleTarget').textContent = '🎯 ' + conf.target;
    popLoop();
    timerId = setInterval(() => {
      timeLeft--;
      $('#moleTime').textContent = '⏰ ' + timeLeft;
      if (timeLeft <= 0) {
        clearTimers();
        const isBest = saveBest('mole', score);
        const success = score >= conf.target;
        let p = '';
        if (success) {
          clearLevel('mole', moleLv);
          p = praise();
          celebrate(p);
        } else {
          sfx.bad();
        }
        showOverlay({
          emoji: success ? (isBest ? '👑' : '🎉') : '🐹',
          title: success ? p : '조금만 더!',
          text: success
            ? `레벨 ${moleLv} 성공! 두더지를 ${score}마리나 잡았어요!`
            : `${score}마리 잡았어요. ${conf.target}마리 잡으면 성공!`,
          win: success,
          onRetry: () => games.mole(moleLv),
          onNext: success && moleLv < MAX_LEVEL ? () => games.mole(moleLv + 1) : null,
        });
      }
    }, 1000);
  };
})();

/* ============================================================
   3. 점프 공룡 (캔버스 러너)
============================================================ */
(function setupRunner() {
  const stage = $('#runStage');
  const canvas = $('#runCanvas');
  const ctx = canvas.getContext('2d');
  let raf = null;
  let running = false;

  // 레벨별: 시작/최고 속도, 장애물 간격 배율, 목표 점수
  const CONF = [
    { base: 3.6, max: 5.2, spawn: 1.15, target: 15 },
    { base: 4.4, max: 6.5, spawn: 1.0, target: 30 },
    { base: 5.2, max: 8, spawn: 0.85, target: 50 },
  ];
  let conf = CONF[0];
  let runLv = 1;

  const state = {
    y: 0, vy: 0, score: 0, speed: 0,
    obstacles: [], clouds: [], lastSpawn: 0,
  };

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = stage.clientWidth * dpr;
    canvas.height = stage.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', () => { if (running) resize(); });

  function jump() {
    if (!running) return;
    if (state.y <= 0.01) {
      state.vy = 13.5;
      sfx.tap();
      $('#runHint').style.display = 'none';
    }
  }
  stage.addEventListener('pointerdown', jump);
  window.addEventListener('keydown', (e) => {
    if ((e.code === 'Space' || e.code === 'ArrowUp') && current === 'runner') { e.preventDefault(); jump(); }
  });

  function stop() {
    running = false;
    cancelAnimationFrame(raf);
    raf = null;
  }
  stoppers.runner = stop;

  function loop() {
    const W = stage.clientWidth;
    const H = stage.clientHeight;
    const groundY = H * 0.78;
    const size = Math.max(38, Math.min(60, W * 0.1)); // 이모지 크기
    const dinoX = W * 0.16;

    // 물리 (중력을 약하게 해서 점프 체공시간을 길게)
    state.vy -= 0.55;
    state.y += state.vy;
    if (state.y < 0) { state.y = 0; state.vy = 0; }
    state.score += state.speed * 0.02;
    state.speed = Math.min(conf.max, conf.base + state.score * 0.005);
    $('#runScore').textContent = '⭐ ' + Math.floor(state.score);

    // 목표 점수에 닿으면 레벨 클리어
    if (Math.floor(state.score) >= conf.target) {
      stop();
      clearLevel('runner', runLv);
      saveBest('runner', Math.floor(state.score));
      const p = praise();
      celebrate(p);
      showOverlay({
        emoji: '🎉',
        title: p,
        text: `레벨 ${runLv} 성공! ${conf.target}점까지 달렸어요!`,
        win: true,
        onRetry: () => games.runner(runLv),
        onNext: runLv < MAX_LEVEL ? () => games.runner(runLv + 1) : null,
      });
      return;
    }

    // 장애물 스폰
    state.lastSpawn += state.speed;
    const spawnGap = (380 + Math.random() * 300) * conf.spawn;
    if (state.lastSpawn > spawnGap) {
      state.lastSpawn = 0;
      state.obstacles.push({ x: W + 40, emoji: Math.random() < 0.75 ? '🌵' : '🪨' });
    }
    state.obstacles.forEach((o) => { o.x -= state.speed; });
    state.obstacles = state.obstacles.filter((o) => o.x > -80);

    // 구름
    if (state.clouds.length < 3 && Math.random() < 0.01) {
      state.clouds.push({ x: W + 40, y: H * (0.08 + Math.random() * 0.3) });
    }
    state.clouds.forEach((c) => { c.x -= state.speed * 0.3; });
    state.clouds = state.clouds.filter((c) => c.x > -80);

    // 그리기
    ctx.clearRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.font = size * 0.8 + 'px sans-serif';
    state.clouds.forEach((c) => ctx.fillText('☁️', c.x, c.y));

    ctx.strokeStyle = 'rgba(255,255,255,.7)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 4);
    ctx.lineTo(W, groundY + 4);
    ctx.stroke();

    ctx.font = size + 'px sans-serif';
    const dinoY = groundY - state.y;
    ctx.save();
    ctx.translate(dinoX, dinoY);
    ctx.scale(-1, 1); // 🦖 이모지가 왼쪽을 보므로 오른쪽으로 뒤집기
    ctx.fillText('🦖', 0, 0);
    ctx.restore();
    state.obstacles.forEach((o) => ctx.fillText(o.emoji, o.x, groundY));

    // 충돌 (넉넉하게 봐줌)
    const hit = state.obstacles.some((o) =>
      Math.abs(o.x - dinoX) < size * 0.34 && state.y < size * 0.45
    );
    if (hit) {
      stop();
      const score = Math.floor(state.score);
      const isBest = saveBest('runner', score);
      sfx.bad();
      showOverlay({
        emoji: isBest ? '👑' : '🦖',
        title: isBest ? '최고 기록이야!' : '아이쿠!',
        text: `${score}점까지 달렸어요! ${conf.target}점이 목표야!`,
        onRetry: () => games.runner(runLv),
      });
      return;
    }
    raf = requestAnimationFrame(loop);
  }

  games.runner = function startRunner(level = 1) {
    stop();
    resize();
    runLv = level;
    conf = CONF[level - 1];
    Object.assign(state, { y: 0, vy: 0, score: 0, speed: conf.base, obstacles: [], clouds: [{ x: stage.clientWidth * 0.6, y: 60 }], lastSpawn: 0 });
    $('#runLevel').textContent = '레벨 ' + level;
    $('#runHint').style.display = '';
    $('#runScore').textContent = '⭐ 0';
    $('#runTarget').textContent = '🎯 ' + conf.target;
    running = true;
    raf = requestAnimationFrame(loop);
  };
})();

/* ============================================================
   4. 숫자 세기 퀴즈
============================================================ */
(function setupQuiz() {
  const fruits = ['🍎', '🍌', '🍓', '🍊', '🍇', '🍉', '🥕', '🍩'];
  const TOTAL = 10;
  const PASS = 8; // 이만큼 맞히면 레벨 클리어
  let quizLv = 1;
  let round = 0;
  let score = 0;
  let answered = false;

  function nextRound() {
    round++;
    answered = false;
    $('#quizRound').textContent = `${round} / ${TOTAL} 문제`;
    // 레벨 1은 1~5, 레벨 2·3은 1~10
    const maxN = quizLv === 1 ? 5 : 10;
    const count = 1 + Math.floor(Math.random() * maxN);
    const fruit = fruits[Math.floor(Math.random() * fruits.length)];

    const box = $('#fruitBox');
    box.innerHTML = '';
    const items = Array(count).fill(fruit);
    if (quizLv === 3) {
      // 레벨 3: 다른 과일이 섞여 있고, 한 과일만 세어야 함
      let other = fruit;
      while (other === fruit) other = fruits[Math.floor(Math.random() * fruits.length)];
      const extra = 2 + Math.floor(Math.random() * 4);
      for (let i = 0; i < extra; i++) items.push(other);
      $('#quizTask').textContent = `${fruit}만 세어 봐!`;
    } else {
      $('#quizTask').textContent = '과일이 몇 개야?';
    }
    shuffle(items).forEach((em, i) => {
      const s = document.createElement('span');
      s.textContent = em;
      s.style.animationDelay = i * 0.07 + 's';
      box.appendChild(s);
    });

    // 보기 3개: 정답 + 근처 오답 2개
    const opts = new Set([count]);
    while (opts.size < 3) {
      const d = count + (Math.floor(Math.random() * 5) - 2);
      if (d >= 1 && d <= maxN) opts.add(d);
    }
    const answers = $('#quizAnswers');
    answers.innerHTML = '';
    shuffle([...opts]).forEach((n) => {
      const b = document.createElement('button');
      b.className = 'numbtn';
      b.textContent = n;
      b.addEventListener('pointerdown', () => {
        if (b.disabled) return;
        if (n === count) {
          if (!answered) { score++; $('#quizScore').textContent = '⭐ ' + score; }
          answered = true;
          sfx.good();
          confetti(8);
          answers.querySelectorAll('button').forEach((x) => (x.disabled = true));
          setTimeout(() => {
            if (round >= TOTAL) finish();
            else nextRound();
          }, 700);
        } else {
          answered = true; // 틀린 뒤 맞혀도 점수 없음
          sfx.bad();
          b.classList.add('wrong');
          b.disabled = true;
        }
      });
      answers.appendChild(b);
    });
  }

  function finish() {
    const isBest = saveBest('quiz', score);
    const success = score >= PASS;
    let p = '';
    if (success) {
      clearLevel('quiz', quizLv);
      p = praise();
      celebrate(p);
    } else {
      sfx.bad();
    }
    const stars = score >= 9 ? '🌟🌟🌟' : score >= 6 ? '🌟🌟' : '🌟';
    showOverlay({
      emoji: success ? (isBest ? '👑' : '🎉') : '🍎',
      title: success ? p : '조금만 더!',
      text: success
        ? `레벨 ${quizLv} 성공! 10문제 중에 ${score}개를 맞혔어요! ${stars}`
        : `${score}개 맞혔어요. ${PASS}개 맞히면 성공!`,
      win: success,
      onRetry: () => games.quiz(quizLv),
      onNext: success && quizLv < MAX_LEVEL ? () => games.quiz(quizLv + 1) : null,
    });
  }

  games.quiz = function startQuiz(level = 1) {
    quizLv = level;
    round = 0;
    score = 0;
    $('#quizLevel').textContent = '레벨 ' + level;
    $('#quizScore').textContent = '⭐ 0';
    nextRound();
  };
})();

/* ============================================================
   5. 비행기 슈팅 (손가락으로 조종, 자동 발사)
============================================================ */
(function setupPlane() {
  const stage = $('#planeStage');
  const canvas = $('#planeCanvas');
  const ctx = canvas.getContext('2d');
  // 레벨별: 적 등장 간격(ms) / 적 속도 / 목표 격추 수
  const CONF = [
    { spawn: 1300, espd: 1.3, target: 15 },
    { spawn: 1000, espd: 1.8, target: 30 },
    { spawn: 800, espd: 2.3, target: 45 },
  ];
  const ENEMIES = ['🛸', '👾', '🎈'];
  let conf = CONF[0];
  let lv = 1;
  let raf = null;
  let running = false;
  let px = 0, targetX = 0, score = 0;
  let bullets = [], enemies = [], booms = [], bgStars = [];
  let lastFire = 0, lastSpawn = 0;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = stage.clientWidth * dpr;
    canvas.height = stage.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function steer(e) {
    const r = stage.getBoundingClientRect();
    targetX = e.clientX - r.left;
    $('#planeHint').style.display = 'none';
  }
  stage.addEventListener('pointerdown', steer);
  stage.addEventListener('pointermove', steer);

  function stop() {
    running = false;
    cancelAnimationFrame(raf);
    raf = null;
  }
  stoppers.plane = stop;

  function loop(ts) {
    const W = stage.clientWidth;
    const H = stage.clientHeight;
    const size = Math.max(36, Math.min(54, W * 0.11));
    const planeY = H - size;
    px += (targetX - px) * 0.22;
    px = Math.max(size / 2, Math.min(W - size / 2, px));

    if (ts - lastFire > 320) { lastFire = ts; bullets.push({ x: px, y: planeY - size * 0.6 }); }
    if (ts - lastSpawn > conf.spawn) {
      lastSpawn = ts;
      enemies.push({
        x: size / 2 + Math.random() * (W - size),
        y: -30,
        vy: conf.espd + Math.random() * 0.6,
        ph: Math.random() * 6.28,
        em: ENEMIES[Math.floor(Math.random() * ENEMIES.length)],
      });
    }

    bullets.forEach((b) => { b.y -= 8; });
    enemies.forEach((en) => { en.y += en.vy; en.x += Math.sin(en.y / 40 + en.ph) * 0.8; });
    for (const en of enemies) {
      for (const b of bullets) {
        if (!en.dead && !b.dead && Math.abs(b.x - en.x) < size * 0.45 && Math.abs(b.y - en.y) < size * 0.45) {
          en.dead = true;
          b.dead = true;
          booms.push({ x: en.x, y: en.y, t: 12 });
          score++;
          sfx.bonk();
        }
      }
    }
    bullets = bullets.filter((b) => !b.dead && b.y > -20);
    enemies = enemies.filter((en) => !en.dead && en.y < H + 40);
    $('#planeScore').textContent = '⭐ ' + score;

    // 그리기
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,.8)';
    bgStars.forEach((s) => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill(); });
    ctx.fillStyle = '#ffe066';
    bullets.forEach((b) => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill(); });
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = size * 0.9 + 'px sans-serif';
    enemies.forEach((en) => ctx.fillText(en.em, en.x, en.y));
    booms.forEach((bm) => { ctx.fillText('💥', bm.x, bm.y); bm.t--; });
    booms = booms.filter((bm) => bm.t > 0);
    ctx.save();
    ctx.translate(px, planeY);
    ctx.rotate(-Math.PI / 4); // 🚀가 위를 보게
    ctx.font = size + 'px sans-serif';
    ctx.fillText('🚀', 0, 0);
    ctx.restore();

    if (score >= conf.target) {
      stop();
      clearLevel('plane', lv);
      saveBest('plane', score);
      const p = praise();
      celebrate(p);
      showOverlay({
        emoji: '🎉',
        title: p,
        text: `레벨 ${lv} 성공! 우주선을 ${score}대나 맞혔어요!`,
        win: true,
        onRetry: () => games.plane(lv),
        onNext: lv < MAX_LEVEL ? () => games.plane(lv + 1) : null,
      });
      return;
    }
    const crash = enemies.some((en) => Math.abs(en.x - px) < size * 0.5 && Math.abs(en.y - planeY) < size * 0.5);
    if (crash) {
      stop();
      saveBest('plane', score);
      sfx.bad();
      showOverlay({
        emoji: '🚀',
        title: '아이쿠! 부딪혔어!',
        text: `${score}대 맞혔어요. ${conf.target}대 맞히면 성공!`,
        onRetry: () => games.plane(lv),
      });
      return;
    }
    raf = requestAnimationFrame(loop);
  }

  games.plane = function startPlane(level = 1) {
    stop();
    resize();
    lv = level;
    conf = CONF[level - 1];
    score = 0;
    bullets = []; enemies = []; booms = [];
    lastFire = 0; lastSpawn = 0;
    px = targetX = stage.clientWidth / 2;
    bgStars = Array.from({ length: 26 }, () => ({
      x: Math.random() * stage.clientWidth,
      y: Math.random() * stage.clientHeight,
      r: 0.6 + Math.random() * 1.8,
    }));
    $('#planeLevel').textContent = '레벨 ' + level;
    $('#planeScore').textContent = '⭐ 0';
    $('#planeTarget').textContent = '🎯 ' + conf.target;
    $('#planeHint').style.display = '';
    running = true;
    raf = requestAnimationFrame(loop);
  };
})();

/* ============================================================
   6. 버블 팡팡 (올라오는 방울을 탭해서 터뜨리기)
============================================================ */
(function setupBubble() {
  const pond = $('#bubPond');
  // 레벨별: 방울 등장 간격(ms) / 올라가는 시간(ms) / 목표 개수 / 폭탄 확률
  const CONF = [
    { spawn: 900, rise: 7000, target: 15, bomb: 0 },
    { spawn: 700, rise: 5500, target: 25, bomb: 0 },
    { spawn: 550, rise: 4200, target: 30, bomb: 0.2 },
  ];
  const ANIMALS = ['🐠', '🐟', '🐡', '🦀', '🐙', '🐢', '⭐', '🦄'];
  let conf = CONF[0];
  let lv = 1, score = 0, timeLeft = 30;
  let spawnId = null, timerId = null;

  function clearAll() {
    clearInterval(spawnId);
    clearInterval(timerId);
    spawnId = timerId = null;
    pond.querySelectorAll('.bub').forEach((b) => b.remove());
  }
  stoppers.bubble = clearAll;

  function spawnBub() {
    const H = pond.clientHeight;
    const W = pond.clientWidth;
    const d = 54 + Math.random() * 36;
    const isBomb = Math.random() < conf.bomb;
    const el = document.createElement('div');
    el.className = 'bub';
    el.style.width = el.style.height = d + 'px';
    el.style.left = Math.random() * Math.max(1, W - d) + 'px';
    el.style.bottom = -d + 'px';
    el.style.fontSize = d * 0.5 + 'px';
    if (isBomb) {
      el.style.background = 'radial-gradient(circle at 30% 30%, #888, #222)';
      el.textContent = '💣';
    } else {
      const hue = Math.floor(Math.random() * 360);
      el.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), hsla(${hue}, 85%, 70%, .8))`;
      el.textContent = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    }
    pond.appendChild(el);
    const anim = el.animate(
      [{ transform: 'translateY(0)' }, { transform: `translateY(-${H + d * 2}px)` }],
      { duration: conf.rise + Math.random() * 1200, easing: 'linear' }
    );
    anim.onfinish = () => el.remove();
    el.addEventListener('pointerdown', () => {
      if (el.classList.contains('pop')) return;
      el.style.transform = getComputedStyle(el).transform; // 지금 위치에 고정
      anim.cancel();
      el.classList.add('pop');
      if (isBomb) {
        score = Math.max(0, score - 2);
        el.textContent = '💥';
        sfx.bad();
      } else {
        score++;
        el.textContent = '✨';
        sfx.bonk();
      }
      $('#bubScore').textContent = '⭐ ' + score;
      setTimeout(() => el.remove(), 200);
    });
  }

  games.bubble = function startBubble(level = 1) {
    clearAll();
    lv = level;
    conf = CONF[level - 1];
    score = 0;
    timeLeft = 30;
    $('#bubLevel').textContent = '레벨 ' + level;
    $('#bubScore').textContent = '⭐ 0';
    $('#bubTime').textContent = '⏰ 30';
    $('#bubTarget').textContent = '🎯 ' + conf.target;
    spawnBub();
    spawnId = setInterval(spawnBub, conf.spawn);
    timerId = setInterval(() => {
      timeLeft--;
      $('#bubTime').textContent = '⏰ ' + timeLeft;
      if (timeLeft <= 0) {
        clearAll();
        const isBest = saveBest('bubble', score);
        const success = score >= conf.target;
        let p = '';
        if (success) {
          clearLevel('bubble', lv);
          p = praise();
          celebrate(p);
        } else {
          sfx.bad();
        }
        showOverlay({
          emoji: success ? (isBest ? '👑' : '🎉') : '🫧',
          title: success ? p : '조금만 더!',
          text: success
            ? `레벨 ${lv} 성공! 방울을 ${score}개나 터뜨렸어요!`
            : `${score}개 터뜨렸어요. ${conf.target}개면 성공!`,
          win: success,
          onRetry: () => games.bubble(lv),
          onNext: success && lv < MAX_LEVEL ? () => games.bubble(lv + 1) : null,
        });
      }
    }, 1000);
  };
})();

/* ============================================================
   7. 사진 퍼즐 (두 조각을 차례로 탭하면 자리 바꾸기)
   📷 버튼으로 내 사진 선택 — 사진은 이 기기에만 저장됨
============================================================ */
(function setupPuzzle() {
  const board = $('#puzBoard');
  const wrap = document.querySelector('#puzzle .puzwrap');
  const refImg = $('#puzRef');
  const fileInput = $('#puzFile');
  let lv = 1, colsN = 2;
  let imgURL = null;
  let perm = [], sel = -1, moves = 0, done = false;

  function defaultImage() {
    const c = document.createElement('canvas');
    c.width = c.height = 600;
    const g = c.getContext('2d');
    const grad = g.createLinearGradient(0, 0, 0, 600);
    grad.addColorStop(0, '#8ec9ff');
    grad.addColorStop(0.68, '#cef0da');
    grad.addColorStop(1, '#8bd06b');
    g.fillStyle = grad;
    g.fillRect(0, 0, 600, 600);
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    const put = (em, x, y, s) => { g.font = s + 'px sans-serif'; g.fillText(em, x, y); };
    put('☀️', 95, 95, 110);
    put('🌈', 330, 130, 190);
    put('☁️', 520, 90, 85);
    put('🦋', 320, 285, 75);
    put('🦖', 170, 430, 175);
    put('🦕', 450, 410, 150);
    put('🌳', 75, 510, 105);
    put('🌷', 530, 540, 70);
    return c.toDataURL('image/png');
  }

  function setImage(url) {
    imgURL = url;
    refImg.src = url;
  }

  function paint(t, piece, tileSize) {
    const r = Math.floor(piece / colsN);
    const c = piece % colsN;
    t.style.backgroundImage = `url(${imgURL})`;
    t.style.backgroundSize = `${tileSize * colsN}px ${tileSize * colsN}px`;
    t.style.backgroundPosition = `-${c * tileSize}px -${r * tileSize}px`;
  }

  function buildBoard() {
    board.innerHTML = '';
    sel = -1;
    moves = 0;
    done = false;
    $('#puzMoves').textContent = '바꾼 횟수 0';
    const n = colsN * colsN;
    perm = shuffle(Array.from({ length: n }, (_, i) => i));
    if (perm.every((v, i) => v === i)) [perm[0], perm[1]] = [perm[1], perm[0]];
    const side = Math.min(wrap.clientWidth, wrap.clientHeight) - 16;
    const tileSize = Math.floor((side - 12 - 4 * (colsN - 1)) / colsN);
    board.style.gridTemplateColumns = `repeat(${colsN}, ${tileSize}px)`;
    board.style.gridAutoRows = tileSize + 'px';
    for (let pos = 0; pos < n; pos++) {
      const t = document.createElement('div');
      t.className = 'ptile';
      paint(t, perm[pos], tileSize);
      t.addEventListener('pointerdown', () => tapTile(pos, tileSize));
      board.appendChild(t);
    }
  }

  function tapTile(i, tileSize) {
    if (done) return;
    const tiles = [...board.children];
    if (sel === -1) {
      sel = i;
      tiles[i].classList.add('sel');
      sfx.tap();
      return;
    }
    if (sel === i) {
      tiles[i].classList.remove('sel');
      sel = -1;
      sfx.tap();
      return;
    }
    const a = sel;
    tiles[a].classList.remove('sel');
    sel = -1;
    [perm[a], perm[i]] = [perm[i], perm[a]];
    paint(tiles[a], perm[a], tileSize);
    paint(tiles[i], perm[i], tileSize);
    moves++;
    $('#puzMoves').textContent = '바꾼 횟수 ' + moves;
    if (perm[a] === a || perm[i] === i) sfx.good(); else sfx.tap();
    if (perm.every((v, idx) => v === idx)) {
      done = true;
      clearLevel('puzzle', lv);
      setTimeout(() => {
        const p = praise();
        celebrate(p);
        showOverlay({
          emoji: '🧩',
          title: p,
          text: `레벨 ${lv} 성공! ${moves}번 만에 사진을 완성했어요!`,
          win: true,
          onRetry: () => games.puzzle(lv),
          onNext: lv < MAX_LEVEL ? () => games.puzzle(lv + 1) : null,
        });
      }, 400);
    }
  }

  async function loadBitmap(file) {
    if (window.createImageBitmap) {
      try { return await createImageBitmap(file, { imageOrientation: 'from-image' }); } catch {}
      try { return await createImageBitmap(file); } catch {}
    }
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = URL.createObjectURL(file);
    });
  }

  fileInput.addEventListener('change', async () => {
    const f = fileInput.files && fileInput.files[0];
    fileInput.value = '';
    if (!f) return;
    try {
      const bmp = await loadBitmap(f);
      const w = bmp.width || bmp.naturalWidth;
      const h = bmp.height || bmp.naturalHeight;
      const s = Math.min(w, h);
      const c = document.createElement('canvas');
      c.width = c.height = 600;
      const g = c.getContext('2d');
      g.drawImage(bmp, (w - s) / 2, (h - s) / 2, s, s, 0, 0, 600, 600);
      const url = c.toDataURL('image/jpeg', 0.85);
      setImage(url);
      store.set('puzzleimg', url); // 이 기기(localStorage)에만 저장
      buildBoard();
      sfx.good();
    } catch {
      sfx.bad();
    }
  });
  $('#puzPick').addEventListener('pointerdown', () => { sfx.tap(); fileInput.click(); });

  games.puzzle = function startPuzzle(level = 1) {
    lv = level;
    colsN = [2, 3, 4][level - 1];
    $('#puzLevel').textContent = '레벨 ' + level;
    if (!imgURL) setImage(store.get('puzzleimg') || defaultImage());
    buildBoard();
  };
})();

/* 길게 눌러도 메뉴/선택 안 뜨게 */
document.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
